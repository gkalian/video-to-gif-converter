<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Video to GIF Converter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">Video to GIF <span id="appVersion"></span></h1>
      <div class="step-indicator">
        <div class="step-dot active" data-step="1">1</div>
        <div class="step-line"></div>
        <div class="step-dot" data-step="2">2</div>
      </div>
      <a id="repoLink" class="repo-link" href="#" target="_blank" title="Source code">
        <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </header>

    <!-- FFmpeg Setup -->
    <section id="setupSection" class="step">
      <div class="setup-card">
        <h2 class="setup-title">FFmpeg Not Found</h2>
        <p class="setup-text">ffmpeg.exe not found. Place ffmpeg.exe in the same folder as the application executable.</p>
      </div>
    </section>

    <!-- Step 1: Extract Frames -->
    <section id="step1" class="step">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone__content">
          <svg class="drop-zone__icon" viewBox="0 0 48 48" fill="none">
            <path d="M24 4L24 32M24 4L16 12M24 4L32 12" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 28V38C8 40.2 9.8 42 12 42H36C38.2 42 40 40.2 40 38V28" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="drop-zone__text">Drop video here or</p>
          <button class="btn btn--primary" id="btnOpenVideo">Open Video</button>
        </div>
      </div>

      <div id="loadingIndicator" class="loading-indicator hidden">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading video...</p>
      </div>

      <div id="videoInfo" class="video-info hidden">
        <div class="video-info__header">
          <span class="video-info__name" id="videoName"></span>
          <button class="btn btn--ghost btn--small" id="btnChangeVideo">Change</button>
        </div>
        <div class="video-info__details">
          <span id="videoDuration"></span>
          <span id="videoResolution"></span>
          <span id="videoCodec"></span>
        </div>

        <div class="settings-grid">
          <div class="setting">
            <label class="setting__label">Start Time (sec)</label>
            <input type="number" id="startTime" class="input" value="0" min="0" step="0.1">
          </div>
          <div class="setting">
            <label class="setting__label">End Time (sec)</label>
            <input type="number" id="endTime" class="input" value="30" min="0.1" step="0.1">
          </div>
          <div class="setting">
            <label class="setting__label">Width (px)</label>
            <input type="number" id="outputWidth" class="input" value="320" min="16" max="1920" step="2">
          </div>
          <div class="setting">
            <label class="setting__label">Height (px)</label>
            <input type="number" id="outputHeight" class="input" value="240" min="16" max="1080" step="2">
          </div>
          <div class="setting">
            <label class="setting__label">FPS / Framerate</label>
            <select id="fpsSelect" class="select">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="15">15</option>
              <option value="20">20</option>
              <option value="24">24</option>
              <option value="25">25</option>
              <option value="30">30</option>
            </select>
          </div>
          <div class="setting setting--checkbox">
            <label class="setting__label">
              <input type="checkbox" id="keepAspect" checked>
              Keep aspect ratio
            </label>
          </div>
        </div>

        <button class="btn btn--primary btn--large" id="btnExtract">Extract Frames</button>
      </div>

      <div id="extractProgress" class="progress-section hidden">
        <div class="progress-bar">
          <div class="progress-bar__fill" id="extractProgressBar"></div>
        </div>
        <p class="progress-text" id="extractProgressText">Extracting frames...</p>
        <button class="btn btn--ghost" id="btnCancelExtract">Cancel</button>
      </div>
    </section>

    <!-- Step 2: Edit Frames & Make GIF -->
    <section id="step2" class="step">
      <div class="step2-toolbar" id="step2Toolbar">
        <div class="toolbar-left">
          <span class="frame-count" id="frameCount">0 frames</span>
          <button class="btn btn--ghost btn--small" id="btnSelectAll">Select All</button>
          <button class="btn btn--danger btn--small" id="btnRemoveSelected" disabled>Remove Selected</button>
        </div>
        <button class="btn btn--ghost btn--small" id="btnBackToStep1">&larr; Back</button>
      </div>

      <div class="frame-viewer" id="frameViewer">
        <div class="frame-viewer__preview">
          <img id="framePreviewImg" src="" alt="Frame preview">
        </div>
        <div class="frame-viewer__sidebar">
          <select id="frameSelector" class="select frame-selector" size="12"></select>
        </div>
      </div>

      <div class="step2-settings" id="step2-settings">
        <div class="settings-grid">
          <div class="setting">
            <label class="setting__label">Playspeed</label>
            <select id="gifPlayspeed" class="select">
              <option value="source" selected>Same as source video</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="setting hidden" id="customFpsSetting">
            <label class="setting__label">Custom FPS</label>
            <select id="gifFpsCustom" class="select">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="15">15</option>
              <option value="20">20</option>
              <option value="24">24</option>
              <option value="25">25</option>
              <option value="30">30</option>
            </select>
          </div>
          <div class="setting">
            <label class="setting__label">Quality</label>
            <select id="gifQuality" class="select">
              <option value="low">Low (smaller file)</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High (best colors)</option>
            </select>
          </div>
          <div class="setting setting--checkbox">
            <label class="setting__label">
              <input type="checkbox" id="gifFastMode">
              Fast mode (global palette)
            </label>
          </div>
        </div>
      </div>

      <div class="step2-bottom-bar" id="step2BottomBar">
        <button class="btn btn--primary" id="btnMakeGif">Make GIF</button>
        <div class="bottom-bar__status" id="gifStatusArea">
          <div class="bottom-bar__progress hidden" id="gifProgress">
            <div class="progress-bar progress-bar--inline">
              <div class="progress-bar__fill" id="gifProgressBar"></div>
            </div>
            <span class="progress-text" id="gifProgressText">Creating GIF...</span>
          </div>
          <span class="bottom-bar__success hidden" id="gifSuccess">GIF saved successfully!</span>
          <span class="bottom-bar__error hidden" id="gifError"></span>
        </div>
        <button class="btn btn--primary btn--small hidden" id="btnOpenGif">Open GIF</button>
        <button class="btn btn--ghost btn--small hidden" id="btnNewConversion">Convert Another Video</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
